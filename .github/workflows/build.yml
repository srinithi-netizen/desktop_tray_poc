name: Build Tauri App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  PG_VERSION: "16.13.0"
  PG_BASE_URL: "https://github.com/theseus-rs/postgresql-binaries/releases/download"

jobs:

# ══════════════════════════════════════════════
#  LINUX  →  .deb
# ══════════════════════════════════════════════
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev \
            patchelf libxdo-dev xz-utils wget

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # ── Embedded PostgreSQL ───────────────────
      - name: Download embedded PostgreSQL (Linux x64)
        run: |
          mkdir -p src-tauri/resources/postgres-linux
          wget -q \
            "${{ env.PG_BASE_URL }}/${{ env.PG_VERSION }}/postgresql-${{ env.PG_VERSION }}-x86_64-unknown-linux-gnu.tar.gz" \
            -O /tmp/pg-linux.tar.gz
          tar -xzf /tmp/pg-linux.tar.gz -C src-tauri/resources/postgres-linux
          echo "Downloaded postgres binaries:"
          ls src-tauri/resources/postgres-linux/bin/

      # ── NestJS server binary ──────────────────
      - name: Install npm dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Build NestJS
        run: |
          cd plaid-server
          npm install
          npm run build

      - name: Bundle NestJS into server binary (Linux)
        run: |
          npm install -g @yao-pkg/pkg
          cd plaid-server
          pkg dist/main.js \
            --targets node20-linux-x64 \
            --output ../src-tauri/resources/server
          chmod +x ../src-tauri/resources/server
          ls -lh ../src-tauri/resources/server

      # ── Tauri build ───────────────────────────
      - name: Build Tauri (.deb)
        run: npm run tauri build -- --bundles deb

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: src-tauri/target/release/bundle/deb/*.deb


# ══════════════════════════════════════════════
#  WINDOWS  →  .msi + .exe
# ══════════════════════════════════════════════
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # ── Embedded PostgreSQL ───────────────────
      - name: Download embedded PostgreSQL (Windows x64)
        shell: pwsh
        run: |
          $dest = "src-tauri/resources/postgres-windows"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          $url = "${{ env.PG_BASE_URL }}/${{ env.PG_VERSION }}/postgresql-${{ env.PG_VERSION }}-x86_64-pc-windows-msvc.tar.gz"
          Invoke-WebRequest -Uri $url -OutFile "$env:TEMP\pg-win.tar.gz"
          tar -xzf "$env:TEMP\pg-win.tar.gz" -C $dest
          Write-Host "Downloaded postgres binaries:"
          Get-ChildItem "$dest/bin" | Select-Object Name

      # ── NestJS server binary ──────────────────
      - name: Install npm dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Build NestJS
        run: |
          cd plaid-server
          npm install
          npm run build

      - name: Bundle NestJS into server.exe (Windows)
        shell: bash
        run: |
          npm install -g @yao-pkg/pkg
          cd plaid-server
          pkg dist/main.js \
            --targets node20-win-x64 \
            --output ../src-tauri/resources/server.exe
          ls -lh ../src-tauri/resources/server.exe

      # ── Tauri build ───────────────────────────
      - name: Build Tauri (.msi + .exe)
        run: npm run tauri build -- --bundles msi,nsis

      - name: Upload Windows installers
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe

